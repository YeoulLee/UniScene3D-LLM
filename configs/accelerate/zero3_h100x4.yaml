# Accelerate + DeepSpeed ZeRO-3 config for 4x H100 (full fine-tune of Qwen3.5-4B).
# Used by scripts/vqa3d/sqa3d_llm.sh via `accelerate launch --config_file`.
#
# When a deepspeed_config_file is provided, all DeepSpeed/precision settings (bf16,
# zero stage, grad accumulation/clipping, micro batch) MUST live in that JSON, not here,
# otherwise Accelerate raises "these accelerate config variables will be ignored".
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: DEEPSPEED
machine_rank: 0
main_training_function: main
num_machines: 1
num_processes: 4
rdzv_backend: static
same_network: true
use_cpu: false
deepspeed_config:
  deepspeed_config_file: configs/deepspeed/zero3.json
  zero3_init_flag: true
